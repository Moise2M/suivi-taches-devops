<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi Tâches DevOps</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
    .clock-num { cursor: pointer; user-select: none; }
    .clock-num:hover circle { fill: #dbeafe; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const API = '/api';

    // ─── Helpers ──────────────────────────────────────────────────────────────
    const fmtDate = (dateStr) => new Date(dateStr + 'T12:00:00').toLocaleDateString('fr-FR');
    const fmtDay  = (dateStr) => new Date(dateStr + 'T12:00:00').toLocaleDateString('fr-FR', { weekday: 'long' });
    const nowTime = () => { const d = new Date(); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; };

    const calcDuration = (start, end) => {
      const [sH, sM] = start.split(':').map(Number);
      const [eH, eM] = end.split(':').map(Number);
      const diff = (eH*60+eM) - (sH*60+sM);
      if (diff <= 0) return null;
      return `${Math.floor(diff/60)}h${(diff%60).toString().padStart(2,'0')}`;
    };

    // Temps total travaillé pour une tâche active (sessions précédentes + session courante)
    const calcActiveElapsed = (resumeTime, workedMinutes) => {
      const [rH, rM] = (resumeTime || '00:00').split(':').map(Number);
      const now = new Date();
      const sessionMins = Math.max(0, (now.getHours()*60 + now.getMinutes()) - (rH*60+rM));
      const total = (workedMinutes || 0) + sessionMins;
      if (total <= 0) return '0h00';
      return `${Math.floor(total/60)}h${(total%60).toString().padStart(2,'0')}`;
    };

    // Formater des minutes brutes en Xh00
    const fmtMinutes = (m) => !m ? '0h00' : `${Math.floor(m/60)}h${(m%60).toString().padStart(2,'0')}`;

    // ─── Modal Projets ─────────────────────────────────────────────────────────
    function ProjectModal({ projects, onClose, onAdd, onDelete }) {
      const [name, setName] = useState('');
      const submit = async () => { if (name.trim()) { await onAdd(name.trim()); setName(''); } };
      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl p-6 w-96 max-h-[80vh] flex flex-col" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-lg font-bold text-slate-800">Gérer les projets</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl font-bold">✕</button>
            </div>
            <div className="flex gap-2 mb-4">
              <input value={name} onChange={e => setName(e.target.value)} onKeyPress={e => e.key==='Enter' && submit()}
                placeholder="Nom du nouveau projet..."
                className="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
              <button onClick={submit} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-semibold">Ajouter</button>
            </div>
            <div className="overflow-y-auto flex-1 space-y-2">
              {projects.map(p => (
                <div key={p} className="flex items-center justify-between px-3 py-2 bg-slate-50 rounded-lg border border-slate-200">
                  <span className="text-sm text-slate-700 font-medium">{p}</span>
                  <button onClick={() => onDelete(p)} className="text-red-400 hover:text-red-600 p-1 rounded text-sm">🗑️</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── Badge de statut ──────────────────────────────────────────────────────
    function StatusBadge({ task }) {
      if (task.status === 'template') return (
        <span className="inline-flex items-center gap-1 px-2 py-0.5 text-xs font-semibold rounded-full bg-slate-100 text-slate-600">
          📅 En attente
        </span>
      );
      if (task.status === 'active') return (
        <span className="inline-flex items-center gap-1 px-2 py-0.5 text-xs font-semibold rounded-full bg-amber-100 text-amber-700 animate-pulse">
          ⏳ En cours
        </span>
      );
      if (task.status === 'paused') return (
        <span className="inline-flex items-center gap-1 px-2 py-0.5 text-xs font-semibold rounded-full bg-blue-100 text-blue-600">
          ⏸ En pause
        </span>
      );
      return null;
    }

    // ─── Carte de tâche ───────────────────────────────────────────────────────
    function TaskCard({ task, now, onEdit, onDelete, onStart, onPause, onResume, onStop, onToggle }) {
      const isTemplate = task.status === 'template';
      const isActive   = task.status === 'active';
      const isPaused   = task.status === 'paused';
      const isDone     = task.status === 'done';

      const elapsed  = isActive ? calcActiveElapsed(task.resumeTime, task.workedMinutes) : null;
      const duration = isDone && task.startTime && task.endTime ? calcDuration(task.startTime, task.endTime) : null;

      const borderClass = isActive ? 'border-amber-300 bg-amber-50'
        : isPaused            ? 'border-blue-300 bg-blue-50'
        : task.completed      ? 'border-emerald-200 bg-emerald-50'
        : isTemplate          ? 'border-slate-200 bg-slate-50'
        :                       'border-slate-200 bg-white hover:border-blue-300';

      return (
        <div className={`flex items-start gap-3 p-3 rounded-lg border-2 transition-all ${borderClass}`}>
          {/* Icône gauche */}
          <div className="mt-0.5 flex-shrink-0 w-6 text-center">
            {isDone && (
              <button onClick={onToggle} className={task.completed ? 'text-emerald-500 text-lg' : 'text-slate-300 text-lg hover:text-slate-500'}>✓</button>
            )}
            {isActive  && <span className="text-amber-500 text-lg">▶</span>}
            {isPaused  && <span className="text-blue-400 text-lg">⏸</span>}
            {isTemplate && <span className="text-slate-400 text-lg">◷</span>}
          </div>

          {/* Contenu */}
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 mb-1 flex-wrap">
              <StatusBadge task={task} />
              <span className="inline-block px-2 py-0.5 text-xs font-semibold rounded bg-blue-100 text-blue-700">
                {task.project}
              </span>
              {/* Temps affiché */}
              {isActive && task.startTime && (
                <span className="text-xs text-amber-700 font-medium">
                  Depuis {task.startTime} · travaillé {elapsed}
                </span>
              )}
              {isPaused && (
                <span className="text-xs text-blue-600 font-medium">
                  Travaillé {fmtMinutes(task.workedMinutes)} · en pause
                </span>
              )}
              {isDone && task.startTime && task.endTime && (
                <span className="text-xs text-slate-500">
                  {task.startTime} – {task.endTime}{duration ? ` (${duration})` : ''}
                </span>
              )}
              {isDone && task.startTime && !task.endTime && (
                <span className="text-xs text-slate-400">{task.startTime}</span>
              )}
            </div>
            <p className={`text-sm text-slate-700 ${task.completed && isDone ? 'line-through opacity-60' : ''}`}>
              {task.description}
            </p>
          </div>

          {/* Actions droite */}
          <div className="flex items-center gap-1 flex-shrink-0 flex-wrap justify-end">
            {isTemplate && (
              <button onClick={onStart}
                className="flex items-center gap-1 px-3 py-1.5 bg-blue-600 text-white text-xs font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                ▶ Commencer
              </button>
            )}
            {isActive && (
              <>
                <button onClick={onPause}
                  className="flex items-center gap-1 px-3 py-1.5 bg-blue-500 text-white text-xs font-semibold rounded-lg hover:bg-blue-600 transition-colors">
                  ⏸ Pause
                </button>
                <button onClick={onStop}
                  className="flex items-center gap-1 px-3 py-1.5 bg-emerald-600 text-white text-xs font-semibold rounded-lg hover:bg-emerald-700 transition-colors">
                  ⏹ Terminer
                </button>
              </>
            )}
            {isPaused && (
              <>
                <button onClick={onResume}
                  className="flex items-center gap-1 px-3 py-1.5 bg-amber-500 text-white text-xs font-semibold rounded-lg hover:bg-amber-600 transition-colors">
                  ▶ Reprendre
                </button>
                <button onClick={onStop}
                  className="flex items-center gap-1 px-3 py-1.5 bg-emerald-600 text-white text-xs font-semibold rounded-lg hover:bg-emerald-700 transition-colors">
                  ⏹ Terminer
                </button>
              </>
            )}
            <button onClick={onEdit}   className="p-1.5 text-blue-400 hover:bg-blue-50 rounded-lg text-sm">✏️</button>
            <button onClick={onDelete} className="p-1.5 text-red-400 hover:bg-red-50 rounded-lg text-sm">🗑️</button>
          </div>
        </div>
      );
    }

    // ─── Application principale ───────────────────────────────────────────────
    function App() {
      const [tasks, setTasks]         = useState([]);
      const [projects, setProjects]   = useState([]);
      const [desc, setDesc]           = useState('');
      const [date, setDate]           = useState(new Date().toISOString().split('T')[0]);
      const [project, setProject]     = useState('');
      const [startTime, setStartTime] = useState('');
      const [loading, setLoading]     = useState(true);
      const [editId, setEditId]       = useState(null);
      const [editEndTime, setEditEndTime] = useState('');
      const [showProjectModal, setShowProjectModal] = useState(false);
      const [isGenPro, setIsGenPro]           = useState(false);
      const [isGenDailyPro, setIsGenDailyPro] = useState(false);
      const [showDailyExport, setShowDailyExport] = useState(false);
      const [exportDay, setExportDay]         = useState(new Date().toISOString().split('T')[0]);
      const [now, setNow]             = useState(new Date());

      // Mise à jour du temps chaque minute (pour l'élapsed des tâches actives)
      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 60000);
        return () => clearInterval(t);
      }, []);

      useEffect(() => { loadData(); }, []);

      const loadData = async () => {
        try {
          const [tr, pr] = await Promise.all([fetch(`${API}/tasks`), fetch(`${API}/projects`)]);
          const td = await tr.json();
          const pd = await pr.json();
          const projs = Array.isArray(pd) && pd.length > 0 ? pd : ['Autre'];
          setTasks(Array.isArray(td) ? td : []);
          setProjects(projs);
          setProject(p => p || projs[0] || '');
        } catch (e) { console.error(e); }
        setLoading(false);
      };

      const apiPost = async (url, body) => {
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (!res.ok) { const err = await res.json(); throw new Error(err.message || 'Erreur serveur'); }
        return res.json();
      };

      const createTask = async (status) => {
        if (!desc.trim()) return;
        try {
          const body = { date, project, description: desc, status };
          if (status === 'active') body.startTime = startTime || nowTime();
          const created = await apiPost(`${API}/tasks`, body);
          setTasks(t => [created, ...t]);
          setDesc(''); setStartTime('');
        } catch (e) { alert('Erreur : ' + e.message); }
      };

      const updateTask = async () => {
        if (!desc.trim()) return;
        try {
          const res = await fetch(`${API}/tasks/${editId}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ date, project, description: desc, startTime: startTime || null, endTime: editEndTime || null }),
          });
          if (!res.ok) throw new Error();
          const updated = await res.json();
          setTasks(t => t.map(x => x.id === editId ? updated : x));
          cancelEdit();
        } catch (e) { alert('Erreur lors de la mise à jour'); }
      };

      const startEdit = (task) => {
        setEditId(task.id); setDesc(task.description);
        setDate(task.date); setProject(task.project);
        setStartTime(task.startTime || ''); setEditEndTime(task.endTime || '');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const cancelEdit = () => {
        setEditId(null); setDesc(''); setStartTime(''); setEditEndTime('');
        setDate(new Date().toISOString().split('T')[0]);
      };

      const deleteTask = async (id) => {
        await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
        setTasks(t => t.filter(x => x.id !== id));
      };

      const startTask = async (id) => {
        try {
          const updated = await apiPost(`${API}/tasks/${id}/start`, {});
          setTasks(t => t.map(x => x.id === id ? updated : x));
        } catch (e) { alert('Erreur : ' + e.message); }
      };

      const pauseTask = async (id) => {
        try {
          const updated = await apiPost(`${API}/tasks/${id}/pause`, {});
          setTasks(t => t.map(x => x.id === id ? updated : x));
        } catch (e) { alert('Erreur : ' + e.message); }
      };

      const resumeTask = async (id) => {
        try {
          const updated = await apiPost(`${API}/tasks/${id}/resume`, {});
          setTasks(t => t.map(x => x.id === id ? updated : x));
        } catch (e) { alert('Erreur : ' + e.message); }
      };

      const stopTask = async (id) => {
        try {
          const updated = await apiPost(`${API}/tasks/${id}/stop`, {});
          setTasks(t => t.map(x => x.id === id ? updated : x));
        } catch (e) { alert('Erreur : ' + e.message); }
      };

      const toggleTask = async (id) => {
        try {
          const updated = await apiPost(`${API}/tasks/${id}/toggle`, {});
          setTasks(t => t.map(x => x.id === id ? updated : x));
        } catch (e) { console.error(e); }
      };

      const addProject = async (name) => {
        const res = await fetch(`${API}/projects`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
        const updated = await res.json();
        setProjects(updated); setProject(name);
      };

      const deleteProject = async (name) => {
        const res = await fetch(`${API}/projects/${encodeURIComponent(name)}`, { method: 'DELETE' });
        const updated = await res.json();
        setProjects(updated);
        if (project === name) setProject(updated[0] || '');
      };

      const exportDaily = async () => {
        try {
          const { content, filename } = await apiPost(`${API}/tasks/export/daily`, { date: exportDay });
          download(content, filename);
          setShowDailyExport(false);
        } catch (e) { alert('Erreur export journalier'); }
      };

      const exportDailyPro = async () => {
        setIsGenDailyPro(true);
        try {
          const { content, filename } = await apiPost(`${API}/tasks/export/daily-pro`, { date: exportDay });
          download(content, filename);
          setShowDailyExport(false);
        } catch (e) { alert('Erreur export journalier Pro. Vérifiez ANTHROPIC_API_KEY.'); }
        finally { setIsGenDailyPro(false); }
      };

      const exportWeekly = async () => {
        try {
          const weekStart = getWeekStart();
          const { content, filename } = await apiPost(`${API}/tasks/export/weekly`, { weekStart });
          download(content, filename);
        } catch (e) { alert('Erreur export'); }
      };

      const exportPro = async () => {
        setIsGenPro(true);
        try {
          const weekStart = getWeekStart();
          const { content, filename } = await apiPost(`${API}/tasks/export/professional`, { weekStart });
          download(content, filename);
        } catch (e) { alert('Erreur export pro. Vérifiez ANTHROPIC_API_KEY.'); }
        finally { setIsGenPro(false); }
      };

      const getWeekStart = () => {
        const d = new Date(); const day = d.getDay();
        d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
        return d.toISOString().split('T')[0];
      };

      const download = (content, filename) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain' }));
        a.download = filename; a.click();
      };

      // Groupement des tâches
      const liveTasks  = tasks.filter(t => t.status === 'active' || t.status === 'paused');
      const otherTasks = tasks.filter(t => t.status !== 'active' && t.status !== 'paused');
      const byDate = otherTasks.reduce((acc, t) => { (acc[t.date] = acc[t.date]||[]).push(t); return acc; }, {});
      const dates  = Object.keys(byDate).sort().reverse();

      if (loading) return (
        <div className="flex items-center justify-center h-screen bg-slate-100">
          <div className="text-center">
            <div className="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mx-auto mb-4"></div>
            <p className="text-slate-600">Chargement...</p>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 p-4 md:p-6">
          <div className="max-w-4xl mx-auto space-y-4">

            {/* ── En-tête ── */}
            <div className="bg-white rounded-xl shadow-md p-5">
              <div className="flex items-center justify-between flex-wrap gap-3 mb-5">
                <h1 className="text-2xl font-bold text-slate-800">📋 Suivi Tâches DevOps</h1>
                <div className="flex gap-2 flex-wrap">
                  <button onClick={() => setShowDailyExport(v => !v)}
                    className={`px-3 py-2 rounded-lg text-sm font-medium transition-colors ${showDailyExport ? 'bg-sky-700 text-white' : 'bg-sky-600 text-white hover:bg-sky-700'}`}>
                    📄 Rapport journalier
                  </button>
                  <button onClick={exportWeekly} className="px-3 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 text-sm font-medium">
                    📅 Rapport hebdo
                  </button>
                  <button onClick={exportPro} disabled={isGenPro}
                    className="px-3 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 disabled:opacity-50 text-sm font-medium">
                    {isGenPro ? '⏳ Génération...' : '✨ Rapport Pro (IA)'}
                  </button>
                </div>
              </div>

              {/* ── Panneau export journalier ── */}
              {showDailyExport && (
                <div className="mb-5 p-4 bg-sky-50 border border-sky-200 rounded-xl space-y-3">
                  <div className="flex items-center gap-3 flex-wrap">
                    <span className="text-sm font-semibold text-sky-800">Choisir le jour :</span>
                    <input type="date" value={exportDay} onChange={e => setExportDay(e.target.value)}
                      className="px-3 py-1.5 border border-sky-300 rounded-lg text-sm focus:ring-2 focus:ring-sky-500 focus:border-transparent"/>
                    <button onClick={() => setShowDailyExport(false)}
                      className="ml-auto text-sky-400 hover:text-sky-700 text-sm">✕ Fermer</button>
                  </div>
                  <div className="flex gap-2 flex-wrap">
                    <button onClick={exportDaily}
                      className="flex items-center gap-1.5 px-4 py-2 bg-sky-600 text-white text-sm font-semibold rounded-lg hover:bg-sky-700 transition-colors">
                      ⬇ Simple
                    </button>
                    <button onClick={exportDailyPro} disabled={isGenDailyPro}
                      className="flex items-center gap-1.5 px-4 py-2 bg-purple-600 text-white text-sm font-semibold rounded-lg hover:bg-purple-700 disabled:opacity-50 transition-colors">
                      {isGenDailyPro ? '⏳ Génération...' : '✨ Pro (IA)'}
                    </button>
                    <p className="self-center text-xs text-sky-600">Inclut : terminées + en cours + planifiées</p>
                  </div>
                </div>
              )}

              {/* Bandeau édition */}
              {editId && (
                <div className="mb-4 px-4 py-2 bg-amber-50 border-l-4 border-amber-400 rounded flex justify-between items-center">
                  <span className="text-amber-800 font-medium text-sm">✏️ Mode édition</span>
                  <button onClick={cancelEdit} className="text-amber-600 hover:text-amber-800 text-sm font-medium">Annuler</button>
                </div>
              )}

              {/* ── Formulaire ── */}
              <div className="space-y-3">
                {/* Ligne 1 : date + projet */}
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Date</label>
                    <input type="date" value={date} onChange={e => setDate(e.target.value)}
                      className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"/>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Projet</label>
                    <div className="flex gap-1">
                      <select value={project} onChange={e => setProject(e.target.value)}
                        className="flex-1 px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                        {projects.map(p => <option key={p}>{p}</option>)}
                      </select>
                      <button onClick={() => setShowProjectModal(true)} title="Gérer les projets"
                        className="px-2 border border-slate-300 rounded-lg hover:bg-slate-50 text-slate-500">⚙️</button>
                    </div>
                  </div>
                </div>

                {/* Ligne 2 : description */}
                <div>
                  <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Description</label>
                  <input type="text" value={desc} onChange={e => setDesc(e.target.value)}
                    onKeyPress={e => e.key === 'Enter' && (editId ? updateTask() : createTask('done'))}
                    placeholder="Décrivez la tâche..."
                    className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
                </div>

                {/* Ligne 3 : heure de début (+ fin en mode édition) */}
                <div className="flex items-center gap-4 flex-wrap">
                  <div className="flex flex-col gap-1">
                    <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Début</label>
                    <input type="time" value={startTime} onChange={e => setStartTime(e.target.value)}
                      className="px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent w-32"/>
                  </div>

                  {editId && (
                    <div className="flex flex-col gap-1">
                      <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Fin</label>
                      <input type="time" value={editEndTime} onChange={e => setEditEndTime(e.target.value)}
                        className="px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent w-32"/>
                    </div>
                  )}

                  {!editId && (
                    <p className="text-xs text-slate-400 italic self-end pb-2">
                      {startTime ? "Fin capturée automatiquement au clic Terminer" : "Optionnel — laissez vide pour démarrer à l'heure actuelle"}
                    </p>
                  )}
                </div>

                {/* Ligne 4 : boutons d'action */}
                {editId ? (
                  <button onClick={updateTask}
                    className="w-full py-2.5 bg-amber-500 text-white font-semibold rounded-lg hover:bg-amber-600 transition-colors">
                    💾 Mettre à jour
                  </button>
                ) : (
                  <div className="grid grid-cols-3 gap-2">
                    <button onClick={() => createTask('template')}
                      className="py-2.5 border-2 border-slate-300 text-slate-600 font-semibold rounded-lg hover:bg-slate-50 transition-colors text-sm">
                      📅 Planifier
                    </button>
                    <button onClick={() => createTask('active')}
                      className="py-2.5 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors text-sm">
                      ▶ Commencer
                    </button>
                    <button onClick={() => { if (!startTime) { alert('Définissez une heure de début pour une saisie complète.'); return; } createTask('done'); }}
                      className="py-2.5 bg-slate-700 text-white font-semibold rounded-lg hover:bg-slate-800 transition-colors text-sm">
                      ✓ Ajouter (passé)
                    </button>
                  </div>
                )}

                {/* Légende des boutons */}
                {!editId && (
                  <div className="grid grid-cols-3 gap-2 text-center">
                    <p className="text-xs text-slate-400">Tâche future, pas encore commencée</p>
                    <p className="text-xs text-slate-400">Démarre maintenant et suit le temps</p>
                    <p className="text-xs text-slate-400">Tâche déjà faite (heure début requise)</p>
                  </div>
                )}
              </div>
            </div>

            {/* ── Section "En cours / En pause" ── */}
            {liveTasks.length > 0 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl shadow-md overflow-hidden">
                <div className="bg-gradient-to-r from-amber-500 to-orange-500 text-white px-5 py-3 flex items-center">
                  <span className="text-lg font-bold">⏳ En cours / En pause</span>
                  <span className="ml-auto bg-white/20 px-3 py-1 rounded-full text-sm font-semibold">
                    {liveTasks.length} tâche{liveTasks.length > 1 ? 's' : ''}
                  </span>
                </div>
                <div className="p-4 space-y-2">
                  {liveTasks.map(task => (
                    <TaskCard key={task.id} task={task} now={now}
                      onEdit={() => startEdit(task)}
                      onDelete={() => deleteTask(task.id)}
                      onStart={() => startTask(task.id)}
                      onPause={() => pauseTask(task.id)}
                      onResume={() => resumeTask(task.id)}
                      onStop={() => stopTask(task.id)}
                      onToggle={() => toggleTask(task.id)}
                    />
                  ))}
                </div>
              </div>
            )}

            {/* ── Liste par date ── */}
            {dates.length === 0 && liveTasks.length === 0 ? (
              <div className="bg-white rounded-xl shadow-md p-8 text-center text-slate-400">
                Aucune tâche enregistrée. Commencez par <strong>▶ Commencer</strong> ou <strong>📅 Planifier</strong> une tâche.
              </div>
            ) : dates.map(d => {
              const dateTasks = byDate[d];
              return (
                <div key={d} className="bg-white rounded-xl shadow-md overflow-hidden">
                  <div className="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-5 py-3 flex items-center">
                    <h2 className="text-base font-semibold capitalize">{fmtDay(d)} — {fmtDate(d)}</h2>
                    <span className="ml-auto bg-white/20 px-3 py-1 rounded-full text-sm">
                      {dateTasks.length} tâche{dateTasks.length > 1 ? 's' : ''}
                    </span>
                  </div>
                  <div className="p-4 space-y-2">
                    {dateTasks.map(task => (
                      <TaskCard key={task.id} task={task} now={now}
                        onEdit={() => startEdit(task)}
                        onDelete={() => deleteTask(task.id)}
                        onStart={() => startTask(task.id)}
                        onPause={() => pauseTask(task.id)}
                        onResume={() => resumeTask(task.id)}
                        onStop={() => stopTask(task.id)}
                        onToggle={() => toggleTask(task.id)}
                      />
                    ))}
                  </div>
                </div>
              );
            })}

            {/* ── Stats ── */}
            {tasks.length > 0 && (
              <div className="bg-white rounded-xl shadow-md p-5">
                <h3 className="text-base font-semibold text-slate-700 mb-4">📊 Statistiques</h3>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {[
                    { val: tasks.length, label: 'Total', color: 'text-blue-600' },
                    { val: tasks.filter(t => t.status==='done' && t.completed).length, label: 'Terminées', color: 'text-emerald-600' },
                    { val: tasks.filter(t => t.status==='active').length, label: 'En cours', color: 'text-amber-600' },
                    { val: tasks.filter(t => t.status==='paused').length, label: 'En pause', color: 'text-blue-500' },
                  ].map(({ val, label, color }) => (
                    <div key={label} className="text-center">
                      <div className={`text-3xl font-bold ${color}`}>{val}</div>
                      <div className="text-sm text-slate-500">{label}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* ── Modals ── */}
          {showProjectModal && (
            <ProjectModal projects={projects} onClose={() => setShowProjectModal(false)} onAdd={addProject} onDelete={deleteProject} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
